<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PR Automotive Group — DealerAmigo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#E8102A;--red-dark:#b50d21;--red-dim:#3a0a0f;--black:#0a0a0a;--dark:#111;--card:#181818;--border:#252525;--muted:#505050;--text:#f0f0f0;--sub:#777}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;height:100dvh}

  header{background:var(--dark);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:11px;flex-shrink:0}
  .logo-badge{background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:17px;width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;letter-spacing:1px}
  .logo-text strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px}
  .logo-text span{font-size:9px;color:var(--red);letter-spacing:3px;text-transform:uppercase}
  .live{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sub)}
  .live-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  #messages{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  #messages::-webkit-scrollbar{width:3px}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .msg{max-width:86%;animation:up .2s ease}
  .msg.bot{align-self:flex-start}
  .msg.user{align-self:flex-end}
  @keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

  .bubble{padding:10px 14px;border-radius:15px;font-size:14px;line-height:1.55}
  .msg.bot .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:3px}
  .msg.user .bubble{background:var(--red);border-bottom-right-radius:3px}
  .msg-time{font-size:9px;color:var(--sub);margin-top:3px;padding:0 3px}
  .msg.user .msg-time{text-align:right}

  .slot-picker{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;width:290px;animation:up .3s ease}
  .slot-picker-title{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .slot-day{margin-bottom:10px}
  .slot-day-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
  .slot-btns{display:flex;gap:7px}
  .slot-btn{background:transparent;border:1px solid var(--border);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:all .15s}
  .slot-btn:hover{border-color:var(--red);color:var(--red)}
  .slot-btn.selected{background:var(--red);border-color:var(--red);color:#fff}

  .v-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;width:272px;align-self:flex-start;animation:up .3s ease}
  .v-card-img{width:100%;height:162px;object-fit:cover;display:block;background:#1a1a1a}
  .v-no-img{width:100%;height:80px;display:flex;align-items:center;justify-content:center;background:#141414;color:var(--sub);font-size:12px}
  .v-body{padding:13px}
  .v-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;line-height:1.1;margin-bottom:7px}
  .v-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--border);color:var(--sub)}
  .badge.hot{background:var(--red-dim);color:var(--red);border:1px solid #5a1010}
  .v-price{font-size:21px;font-weight:700;color:var(--red);margin-bottom:11px}
  .v-actions{display:flex;gap:7px}
  .btn-primary{flex:1;background:var(--red);color:#fff;border:none;border-radius:9px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:var(--red-dark)}
  .btn-photo{background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:9px;padding:10px 11px;font-family:'DM Sans',sans-serif;font-size:12px;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
  .btn-photo:hover{border-color:var(--red);color:var(--red)}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.open{opacity:1;pointer-events:all}
  .panel{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);border-radius:18px 18px 0 0;padding:18px 15px 34px;z-index:100;transform:translateY(100%);transition:transform .33s cubic-bezier(.32,.72,0,1);max-height:90dvh;overflow-y:auto}
  .panel.open{transform:translateY(0)}
  .panel-handle{width:38px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px}
  .panel-img{width:100%;height:210px;object-fit:cover;border-radius:11px;margin-bottom:14px;background:#1a1a1a;display:block}
  .panel-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1.1;margin-bottom:3px}
  .panel-price{font-size:22px;font-weight:700;color:var(--red);margin-bottom:14px}
  .panel-specs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .spec{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
  .spec-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}
  .spec-val{font-size:13px;font-weight:600;margin-top:2px}
  .panel-pitch{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:11px;padding:13px;font-size:13px;line-height:1.65;color:var(--sub);margin-bottom:14px}
  .panel-pitch strong{color:var(--text)}
  .panel-photo-link{display:flex;align-items:center;gap:8px;background:var(--red-dim);border:1px solid #5a1010;border-radius:9px;padding:11px 13px;color:var(--red);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:14px}
  .btn-close{width:100%;background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:9px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}

  .typing{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:3px;padding:11px 15px;border-radius:15px;display:flex;gap:4px;align-items:center}
  .typing span{width:5px;height:5px;background:var(--sub);border-radius:50%;animation:dot 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  #chips{display:flex;gap:7px;padding:0 14px 9px;overflow-x:auto;flex-shrink:0}
  #chips::-webkit-scrollbar{display:none}
  .chip{background:transparent;border:1px solid var(--border);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .chip:hover{border-color:var(--red);color:var(--red)}

  #input-row{background:var(--dark);border-top:1px solid var(--border);padding:11px 14px;display:flex;gap:9px;align-items:flex-end;flex-shrink:0}
  #txt{flex:1;background:var(--card);border:1px solid var(--border);border-radius:19px;padding:9px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;max-height:96px;line-height:1.4;outline:none;transition:border-color .2s}
  #txt:focus{border-color:var(--red)}
  #txt::placeholder{color:var(--muted)}
  #send{background:var(--red);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,transform .1s}
  #send:hover{background:var(--red-dark)}
  #send:active{transform:scale(.92)}
  #send svg{width:15px;height:15px;fill:#fff}
  .footer{text-align:center;font-size:9px;color:var(--muted);padding:3px 0 7px;letter-spacing:2px;text-transform:uppercase;flex-shrink:0}

  .lead-ok{background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e33;border-radius:11px;padding:11px 13px;font-size:12px;color:#86efac;display:flex;align-items:flex-start;gap:7px;animation:up .3s ease;align-self:flex-start;max-width:88%;line-height:1.6}

  /* REFRESH BANNER */
  #refresh-banner{display:none;position:fixed;top:0;left:0;right:0;background:#1a1a1a;border-bottom:1px solid var(--border);padding:10px 16px;text-align:center;font-size:13px;color:var(--sub);z-index:200}
  #refresh-banner button{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-left:10px}
</style>
</head>
<body>

<!-- REFRESH BANNER (aparece si hay timeout) -->
<div id="refresh-banner">
  La sesión expiró. <button onclick="location.reload()">Reiniciar chat</button>
</div>

<header>
  <div class="logo-badge">PR</div>
  <div class="logo-text">
    <strong>PR AUTOMOTIVE GROUP</strong>
    <span>Retail &amp; Wholesale · Carolina, PR</span>
  </div>
  <div class="live"><div class="live-dot"></div>En línea</div>
</header>

<div id="messages"></div>

<div id="chips">
  <button class="chip" onclick="chip(this)">Ver inventario</button>
  <button class="chip" onclick="chip(this)">Necesito financiamiento</button>
  <button class="chip" onclick="chip(this)">Tengo trade-in</button>
  <button class="chip" onclick="chip(this)">¿Hacen entrega?</button>
  <button class="chip" onclick="chip(this)">Crédito bajo</button>
  <button class="chip" onclick="chip(this)">Pick ups disponibles</button>
</div>

<div id="input-row">
  <textarea id="txt" placeholder="Escríbeme aquí..." rows="1"></textarea>
  <button id="send" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<div class="footer">Powered by DealerAmigo</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <img id="p-img" src="" alt="" class="panel-img"/>
  <div class="panel-title" id="p-title"></div>
  <div class="panel-price" id="p-price"></div>
  <div class="panel-specs" id="p-specs"></div>
  <div class="panel-pitch" id="p-pitch"></div>
  <a id="p-photo-link" href="#" target="_blank" class="panel-photo-link" style="display:none">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1.1 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    Ver foto del vehículo (abre en nueva pestaña)
  </a>
  <button class="btn-close" onclick="closePanel()">← Volver al chat</button>
</div>

<script>
// ================================================================
// CONFIG — Solo cambia esta URL cuando hagas nuevo deployment
// ================================================================
const GS_URL = 'https://script.google.com/macros/s/AKfycbw2PqRvBBektQeLrz1QvYrkuS80UZRm0QnHe8lI7aTpHIzGw5PVnS8fmavkssqA3PdIsA/exec';
// ================================================================
// ARQUITECTURA (sin CORS, sin key expuesta):
// Chat        → GET ?action=chat&data=...  → Apps Script llama Claude
// Inventario  → GET ?action=inventory      → Apps Script lee Sheet
// Leads       → POST text/plain + no-cors  → Apps Script guarda en Sheet
// Auto-refresh si Apps Script tarda >25s (timeout protection)
// ================================================================

let INVENTARIO   = [];
let SLOTS        = [];
let history      = [];
let leadData     = {};
let leadEnviado  = false;
let isTyping     = false;
let errorCount   = 0;
const MAX_ERRORS = 3;
const CHAT_TIMEOUT_MS = 25000; // 25s — Apps Script tiene límite de 30s

// ── PITCHES ──
const PITCHES = {
  'GLC 300':    v=>`<strong>El GLC 300 Coupe es pura declaración.</strong> Solo ${v.millaje} millas, motor turbo europeo — garantía hasta 100,000 millas. Nadie más en PR te da eso en un Mercedes.`,
  'GV80':       v=>`<strong>El Genesis GV80 Prestige — el secreto del mercado.</strong> V6 twin-turbo, ${v.millaje} millas, acabados que rivalizan con el BMW X5 a menor precio. Garantía hasta 100k millas.`,
  'Tacoma':     v=>`<strong>Tacoma TRD Sport ${v.ano} — ${v.millaje} millas.</strong> La pick up más confiable del mercado.${v.descripcion?' '+v.descripcion+'.':''} Garantía hasta 100k millas.`,
  'Corolla':    v=>`<strong>Corolla LE ${v.ano} — economía sin sacrificar nada.</strong> ${v.mpg} MPG, ${v.millaje} millas.${v.descripcion?' '+v.descripcion+'.':''} Garantía hasta 100k millas.`,
  'Pathfinder': v=>`<strong>Pathfinder SV — 3 filas, V6, espacio de sobra.</strong> ${v.millaje} millas, ${v.mpg} MPG. ${v.descripcion||''} Garantía hasta 100k millas.`,
  'Tucson':     v=>`<strong>Tucson ${v.ano} — ${v.descripcion||'lista para entrega inmediata'}.</strong> ${v.mpg} MPG, solo ${v.millaje} millas. Garantía hasta 100k millas.`,
  'Santa Cruz': v=>`<strong>Santa Cruz ${v.ano} — comodidad de SUV, utilidad de pick up.</strong> Solo ${v.millaje} millas. Garantía hasta 100k millas.`,
  'Carnival':   v=>`<strong>Kia Carnival ${v.ano} — minivan redefinida.</strong> V6, ${v.millaje} millas. Espacio premium para la familia. Garantía hasta 100k millas.`
};

function getPitch(v) {
  for (const [k,fn] of Object.entries(PITCHES)) {
    if ((v.modelo||'').includes(k)) return fn(v);
  }
  return `<strong>${v.ano} ${v.marca} ${v.modelo}</strong> — ${v.millaje} millas, ${v.color}, ${v.mpg} MPG. ${v.precio||v.precio_venta||''}. Garantía hasta 100,000 millas.`;
}

// ── FALLBACK INVENTORY ──
const FALLBACK_INV = [
  {ano:'2023',marca:'Mercedes-Benz',modelo:'GLC 300',sub_modelo_trim_level:'Coupe',motor:'2.0L Turbo',transmision:'9-speed Auto',mpg:'20/20',color:'Negra',precio:'$52,995',millaje:'17k',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=640,height=480,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_69e640bca6057.jpg',clase:'Luxury',descripcion:''},
  {ano:'2024',marca:'Genesis',modelo:'GV80',sub_modelo_trim_level:'Prestige',motor:'3.5L Twin-Turbo V6',transmision:'8-speed Auto',mpg:'18/18',color:'Blanca Perla',precio:'$55,595',millaje:'18k',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=1024,height=768,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_69d558fc95b25.jpg',clase:'De Lujo',descripcion:''},
  {ano:'2025',marca:'Toyota',modelo:'Tacoma',sub_modelo_trim_level:'2WD TRD Sport',motor:'4 cil Turbo',transmision:'8 velocidades',mpg:'20/24',color:'Gris Cemento',precio:'$47,995',millaje:'10',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=1024,height=768,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_69ac5fbd1830e.jpg',clase:'Pick Up',descripcion:'Oferta especial con trade-in'},
  {ano:'2024',marca:'Toyota',modelo:'Corolla',sub_modelo_trim_level:'LE',motor:'4 cil',transmision:'CVT',mpg:'31/31',color:'Gris Cemento',precio:'$23,995',millaje:'28,922',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=640,height=480,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_69496b3b6761a.jpg',clase:'Económico',descripcion:'Oferta para primeros compradores'},
  {ano:'2023',marca:'Nissan',modelo:'Pathfinder',sub_modelo_trim_level:'SV',motor:'V6',transmision:'CVT',mpg:'20/27',color:'Gris',precio:'$28,995',millaje:'42,546',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=1024,height=768,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_68c887457bd0b.jpg',clase:'3 Filas',descripcion:'Super espaciosa'},
  {ano:'2024',marca:'Kia',modelo:'Carnival',sub_modelo_trim_level:'',motor:'V6',transmision:'8-speed',mpg:'19/19',color:'Blanca',precio:'$30,995',millaje:'28k',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=1024,height=768,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_686bf9396392c.png',clase:'Mini-Van',descripcion:''},
  {ano:'2026',marca:'Hyundai',modelo:'Santa Cruz',sub_modelo_trim_level:'SE',motor:'4 cilindros',transmision:'8-speed',mpg:'22/22',color:'Gris',precio:'$37,995',millaje:'20',fotoweblink:'https://apicdn.inventario360.com/cdn-cgi/image/width=640,height=480,fit=cover,quality=100,onerror=redirect/vehicles/oPAa7Wj5/media_6978bfdb83600.jpg',clase:'Pick Up',descripcion:''},
  {ano:'2025',marca:'Hyundai',modelo:'Tucson',sub_modelo_trim_level:'',motor:'4 cil',transmision:'8-speed Auto',mpg:'26/31',color:'Gris',precio:'$28,996',millaje:'16',fotoweblink:'',clase:'SUV',descripcion:'Ruleta de Ofertas — pagos desde $368/mes'}
];

function buildFallbackSlots() {
  const nombres=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const today=new Date(); const out=[];
  for(let i=1;i<=5&&out.length<2;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    if(d.getDay()===0) continue;
    const label=nombres[d.getDay()-1]+' '+d.getDate();
    const s9=new Date(d); s9.setHours(9,0,0,0);
    const s14=new Date(d); s14.setHours(14,0,0,0);
    out.push({dia:label,date:d.toISOString(),slots:[
      {key:'morning', label:'9:00 AM',datetime:s9.toISOString(), display:label+' a las 9:00 AM'},
      {key:'afternoon',label:'2:00 PM',datetime:s14.toISOString(),display:label+' a las 2:00 PM'}
    ]});
  }
  return out;
}

// ── SYSTEM PROMPT ──
function buildPrompt() {
  const inv=INVENTARIO.map(v=>{
    const t=v.sub_modelo_trim_level||v.trim||'';
    const foto=v.fotoweblink||v.foto||'';
    return `• ${v.ano} ${v.marca} ${v.modelo} ${t} | ${v.millaje} millas | ${v.precio||v.precio_venta||''} | ${v.color||''} | ${v.clase||''} | Foto: ${foto||'sin foto'} | ${v.descripcion||''}`;
  }).join('\n');
  const slotsTexto=SLOTS.map(d=>d.slots.map(s=>`• ${s.display}`).join('\n')).join('\n');

  return `Eres DealerAmigo, asesor de ventas virtual de PR Automotive Group en Puerto Rico.
Eres un vendedor experto, no un chatbot. Guías la conversación, calificas al cliente y cierras citas.

## DEALER
PR Automotive Group — Marginal Los Angeles, Carolina PR (frente al Aeropuerto SJU).
- Único dealer en PR: garantía hasta 100,000 millas en usados + protección de crédito incluida
- Tanque lleno en cada entrega. Entrega disponible en toda la isla. Trade-in con o sin deuda.

## INVENTARIO DISPONIBLE
${inv}

## SLOTS DE CITA DISPONIBLES
${slotsTexto}

## REGLAS
- Máximo 3 líneas por mensaje. UNA sola pregunta por mensaje.
- Tono: español natural de PR, cálido, seguro, profesional. Nunca brusco.
- Siempre controlas la dirección de la conversación.

## MOSTRAR VEHÍCULO
Al recomendar un vehículo escribe al final (línea nueva):
MOSTRAR_VEHICULO:[año] [marca] [modelo]

## FLUJO DE CITA
1. Ofrece los 2 primeros slots disponibles
2. Cuando elija → "¿Tienes un email? Te mando la confirmación — es opcional."
3. "¿Está bien si un asesor te llama antes de la cita para preparar todo?"
4. Cuando confirmes → genera LEAD_DATA

## CAPTURA DE LEAD
Cuando tengas nombre + teléfono + interés, escribe al final (línea nueva):
LEAD_DATA:{"nombre":"","telefono":"","email":"","vehiculo_interes":"","tipo_vehiculo":"","presupuesto_mensual":"","tiempo_compra":"","financiamiento":"","credito":"","pronto":"","ingreso":"","notas":"","resumen":"","agendo_cita":"Si o No","datetime_cita":"ISO string","fecha_display":"Lunes 5 de mayo","hora_display":"9:00 AM","fuente":"Web"}

## OBJECIONES
"Está caro" → "¿Qué pago mensual te haría sentido?"
"Crédito malo" → "Trabajamos con eso. ¿Hace cuánto fue el detalle?"
"No tengo inicial" → "Hay opciones con poco o nada. ¿Te interesa?"
"Lo voy a pensar" → "¿Qué número en el pago haría que no tengas que pensarlo?"

## SI NO HAY INVENTARIO EXACTO
Nunca digas "no hay". Di: "Ese modelo se mueve mucho — no tengo ese exacto ahora pero puedo conseguirte algo similar. ¿Financiado o efectivo?"`;
}

// ── LOAD INVENTORY via GET (sin CORS) ──
async function cargarDatos() {
  try {
    const res  = await fetch(GS_URL + '?action=inventory');
    const json = await res.json();
    if (json.status==='ok') {
      if (json.inventario?.length) INVENTARIO=json.inventario;
      if (json.slots?.length)      SLOTS=json.slots;
    }
  } catch(err) {
    console.warn('Inventario fallback:', err.message);
  }
  if (!INVENTARIO.length) INVENTARIO=FALLBACK_INV;
  if (!SLOTS.length)      SLOTS=buildFallbackSlots();
  iniciarChat();
}

// ── CALL CLAUDE via GET (key segura en Apps Script) ──
async function callClaude(userText) {
  history.push({role:'user',content:userText});

  const payload = {
    messages: history,
    system:   buildPrompt()
  };

  // Encode payload como query param — GET evita CORS preflight
  const encoded = encodeURIComponent(JSON.stringify(payload));
  const url     = GS_URL + '?action=chat&data=' + encoded;

  // Timeout de 25s para proteger contra timeout de Apps Script
  const controller = new AbortController();
  const timer = setTimeout(()=>{
    controller.abort();
    mostrarRefreshBanner();
  }, CHAT_TIMEOUT_MS);

  const res  = await fetch(url, { signal: controller.signal });
  clearTimeout(timer);

  const json = await res.json();
  if (json.status==='error') throw new Error(json.message);

  const reply = json.reply || 'Tuve un problema. Escríbeme de nuevo.';
  history.push({role:'assistant',content:reply});
  errorCount = 0;
  return reply;
}

// ── AUTO-REFRESH BANNER ──
function mostrarRefreshBanner() {
  document.getElementById('refresh-banner').style.display='block';
}

// ── SEND LEAD via POST text/plain + no-cors (sin CORS error) ──
function enviarLead(data) {
  if (leadEnviado) return;
  leadEnviado = true;

  // text/plain no dispara preflight OPTIONS → sin CORS block
  fetch(GS_URL, {
    method:  'POST',
    headers: {'Content-Type':'text/plain;charset=utf-8'},
    body:    JSON.stringify(data),
    mode:    'no-cors'
  }).catch(err=>console.warn('Lead send:', err));

  // Banner inmediato
  const msgs=document.getElementById('messages');
  const agendo=(data.agendo_cita||'').toLowerCase()==='si';
  const banner=document.createElement('div');
  banner.className='lead-ok';
  banner.innerHTML=agendo&&data.fecha_display
    ?`✅ <div><strong>¡Cita confirmada, ${data.nombre||''}!</strong><br>📅 ${data.fecha_display} a las ${data.hora_display}${data.email?'<br>📧 Confirmación → '+data.email:''}<br>📞 Te contactamos al ${data.telefono||'—'}</div>`
    :`✅ <div><strong>${data.nombre||'Lead'} registrado</strong><br>Un asesor te contactará al ${data.telefono||'—'} muy pronto.</div>`;
  msgs.appendChild(banner);
  msgs.scrollTop=msgs.scrollHeight;
}

// ── FIND VEHICLE ──
function findVehiculo(key) {
  const k=key.toLowerCase();
  return INVENTARIO.find(v=>
    k.includes((v.modelo||'').toLowerCase())||
    k.includes((v.marca||'').toLowerCase())
  );
}

// ── VEHICLE CARD ──
function renderCard(v) {
  const msgs=document.getElementById('messages');
  const foto=v.fotoweblink||v.foto||'';
  const trim=v.sub_modelo_trim_level||'';
  const desc=v.descripcion||'';
  const precio=v.precio||v.precio_venta||'';
  const vStr=encodeURIComponent(JSON.stringify(v));
  const el=document.createElement('div');
  el.className='v-card';
  el.innerHTML=`
    ${foto?`<img class="v-card-img" src="${foto}" alt="${v.modelo}" loading="lazy" onerror="this.style.display='none'">`:`<div class="v-no-img">📷 Foto disponible en el dealer</div>`}
    <div class="v-body">
      <div class="v-title">${v.ano} ${v.marca}<br>${v.modelo} ${trim}</div>
      <div class="v-badges">
        <span class="badge">${v.millaje} millas</span>
        <span class="badge">${v.color||''}</span>
        <span class="badge">${v.clase||''}</span>
        ${desc?'<span class="badge hot">⚡ Oferta</span>':''}
      </div>
      <div class="v-price">${precio}</div>
      <div class="v-actions">
        <button class="btn-primary" onclick="openPanel(decodeURIComponent('${vStr}'))">Más detalles</button>
        ${foto?`<a href="${foto}" target="_blank" class="btn-photo">📷 Foto</a>`:''}
      </div>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop=msgs.scrollHeight;
}

// ── SLOT PICKER ──
function renderSlotPicker() {
  if (!SLOTS.length||document.getElementById('slot-picker')) return;
  const msgs=document.getElementById('messages');
  const el=document.createElement('div');
  el.className='slot-picker'; el.id='slot-picker';
  let html=`<div class="slot-picker-title">📅 Selecciona tu horario</div>`;
  SLOTS.slice(0,2).forEach(dia=>{
    html+=`<div class="slot-day"><div class="slot-day-label">${dia.dia}</div><div class="slot-btns">`;
    dia.slots.forEach(s=>{
      html+=`<button class="slot-btn" data-datetime="${s.datetime}" data-display="${s.display}" data-fecha="${dia.dia}" data-hora="${s.label}" onclick="selectSlot(this)">${s.label}</button>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
  msgs.appendChild(el);
  msgs.scrollTop=msgs.scrollHeight;
}

function selectSlot(btn) {
  document.querySelectorAll('.slot-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  leadData.datetime_cita=btn.dataset.datetime;
  leadData.fecha_display=btn.dataset.fecha;
  leadData.hora_display =btn.dataset.hora;
  document.getElementById('txt').value=btn.dataset.display;
  send();
}

// ── DETAIL PANEL ──
function openPanel(vStr) {
  const v=typeof vStr==='string'?JSON.parse(vStr):vStr;
  const foto=v.fotoweblink||v.foto||'';
  const trim=v.sub_modelo_trim_level||'';
  const desc=v.descripcion||'';
  const precio=v.precio||v.precio_venta||'';
  const img=document.getElementById('p-img');
  foto?(img.src=foto,img.style.display='block'):(img.style.display='none');
  document.getElementById('p-title').textContent=`${v.ano} ${v.marca} ${v.modelo} ${trim}`.trim();
  document.getElementById('p-price').textContent=precio;
  document.getElementById('p-specs').innerHTML=`
    <div class="spec"><div class="spec-lbl">Millaje</div><div class="spec-val">${v.millaje} millas</div></div>
    <div class="spec"><div class="spec-lbl">Color</div><div class="spec-val">${v.color||'—'}</div></div>
    <div class="spec"><div class="spec-lbl">Motor</div><div class="spec-val">${v.motor||'—'}</div></div>
    <div class="spec"><div class="spec-lbl">Transmisión</div><div class="spec-val">${v.transmision||'—'}</div></div>
    <div class="spec"><div class="spec-lbl">MPG</div><div class="spec-val">${v.mpg||'—'}</div></div>
    <div class="spec"><div class="spec-lbl">Clase</div><div class="spec-val">${v.clase||'—'}</div></div>
    ${desc?`<div class="spec" style="grid-column:1/-1"><div class="spec-lbl">Oferta especial</div><div class="spec-val" style="color:var(--red)">${desc}</div></div>`:''}`;
  document.getElementById('p-pitch').innerHTML=getPitch(v);
  const pl=document.getElementById('p-photo-link');
  foto?(pl.href=foto,pl.style.display='flex'):(pl.style.display='none');
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── MESSAGES ──
function getTime(){return new Date().toLocaleTimeString('es-PR',{hour:'2-digit',minute:'2-digit'});}

function addMsg(text,role){
  const msgs=document.getElementById('messages');
  const vMatch=text.match(/MOSTRAR_VEHICULO:([^\n]+)/);
  const leadMatch=text.match(/LEAD_DATA:(\{[\s\S]*?\})(?=\s*$)/m)||text.match(/LEAD_DATA:(\{[\s\S]*\})/);
  const slotTrigger=role==='bot'&&/cuándo|cuando|horario|agend|cita.*día|día.*visita/i.test(text);
  const clean=text.replace(/MOSTRAR_VEHICULO:[^\n]*/g,'').replace(/LEAD_DATA:\{[\s\S]*?\}(?=\s*$)/mg,'').replace(/LEAD_DATA:\{[\s\S]*\}/g,'').trim();

  if(clean){
    const div=document.createElement('div');
    div.className=`msg ${role}`;
    div.innerHTML=`<div class="bubble">${clean.replace(/\n/g,'<br>')}</div><div class="msg-time">${getTime()}</div>`;
    msgs.appendChild(div);
  }
  if(vMatch){const v=findVehiculo(vMatch[1].trim());if(v)setTimeout(()=>renderCard(v),350);}
  if(slotTrigger) setTimeout(()=>renderSlotPicker(),500);
  if(leadMatch&&!leadEnviado){
    try{
      const parsed=JSON.parse(leadMatch[1]);
      if(leadData.datetime_cita){parsed.datetime_cita=leadData.datetime_cita;parsed.fecha_display=leadData.fecha_display;parsed.hora_display=leadData.hora_display;}
      Object.assign(leadData,parsed);
      setTimeout(()=>enviarLead(leadData),400);
    }catch(err){console.warn('Lead parse:',err.message);}
  }
  msgs.scrollTop=msgs.scrollHeight;
}

// ── TYPING ──
function showTyping(){
  const msgs=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg bot';d.id='typing';
  d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove();}

// ── SEND ──
async function send(){
  if(isTyping) return;
  const input=document.getElementById('txt');
  const text=input.value.trim();
  if(!text) return;
  input.value='';input.style.height='auto';
  addMsg(text,'user');
  isTyping=true;showTyping();
  try{
    const reply=await callClaude(text);
    hideTyping();addMsg(reply,'bot');
  }catch(err){
    hideTyping();
    errorCount++;
    if(errorCount>=MAX_ERRORS){
      mostrarRefreshBanner();
    } else {
      addMsg('Tuve un problema momentáneo. Intenta de nuevo.','bot');
    }
    console.error('Error:',err.message);
  }
  isTyping=false;
}

function chip(btn){document.getElementById('txt').value=btn.textContent;send();}

document.getElementById('txt').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,96)+'px';
});
document.getElementById('txt').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});

// ── INIT ──
function iniciarChat(){
  const g='¡Buenas! Soy DealerAmigo, tu asesor de PR Automotive Group. 🚗\n¿Qué tipo de vehículo estás buscando?';
  history.push({role:'assistant',content:g});
  addMsg(g,'bot');
}

window.addEventListener('DOMContentLoaded',cargarDatos);
